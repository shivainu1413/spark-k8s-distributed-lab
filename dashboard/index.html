<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spark on K8s</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#09090b;--bg2:#18181b;--border:#27272a;--text:#fafafa;--textDim:#71717a;--textMuted:#3f3f46;
  --grid:rgba(255,255,255,.04);
}
:root.light{
  --bg:#ffffff;--bg2:#f4f4f5;--border:#e4e4e7;--text:#18181b;--textDim:#71717a;--textMuted:#a1a1aa;
  --grid:rgba(0,0,0,.06);
}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--textDim);height:100vh;display:flex;flex-direction:column;overflow:hidden;transition:background .3s}
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

.bar{display:flex;justify-content:space-between;align-items:center;padding:0 20px;height:40px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--bg)}
.bar-left{display:flex;align-items:center;gap:12px}
.bar-left .logo{font-size:13px;font-weight:700;color:var(--text);letter-spacing:-.3px}
.bar-left .logo b{color:#f97316}
.bar-left .sep{color:var(--border)}
.bar-left .ns{font-size:11px;color:#52525b;font-family:'JetBrains Mono',monospace}
.chip{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:500;color:var(--textDim)}
.chip .dot{width:6px;height:6px;border-radius:50%;background:var(--border);transition:all .3s}
.theme-btn{background:var(--bg2);border:1px solid var(--border);color:var(--textDim);font-size:11px;padding:4px 10px;border-radius:6px;cursor:pointer;font-family:inherit;transition:all .2s}
.theme-btn:hover{color:var(--text)}
.chip .dot.on{background:#22c55e;box-shadow:0 0 8px #22c55e40}

.body{flex:1;position:relative;overflow:hidden}
.canvas-area{width:100%;height:100%}
canvas{display:block}

/* Sidebar — drawer overlay */
.side{position:absolute;top:0;right:0;width:300px;height:100%;background:color-mix(in srgb, var(--bg) 92%, transparent);backdrop-filter:blur(12px);border-left:1px solid var(--border);display:flex;flex-direction:column;transform:translateX(0);transition:transform .25s ease;z-index:10}
.side.closed{transform:translateX(100%)}
.side-head{padding:10px 14px;font-size:10px;font-weight:600;color:var(--textMuted);text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;white-space:nowrap}
.side-head .toggle{cursor:pointer;color:#52525b;font-size:14px;transition:color .2s}
.side-head .toggle:hover{color:#a1a1aa}
.side-scroll{flex:1;overflow-y:auto}

/* Tooltip */
.tooltip{position:absolute;pointer-events:none;padding:10px 14px;border-radius:8px;font-size:11px;line-height:1.7;background:var(--bg2);border:1px solid var(--border);box-shadow:0 8px 24px rgba(0,0,0,.3);opacity:0;transition:opacity .15s;z-index:20;max-width:260px;font-family:'JetBrains Mono',monospace;white-space:nowrap}
.tooltip.show{opacity:1}
.tooltip .tt-title{font-weight:700;font-size:12px;color:var(--text);margin-bottom:4px;font-family:'Inter',sans-serif}
.tooltip .tt-row{display:flex;justify-content:space-between;gap:16px}
.tooltip .tt-label{color:var(--textMuted)}
.tooltip .tt-val{color:var(--text);font-weight:500}
.tooltip .tt-accent{font-weight:600}

.ev{padding:6px 14px;border-bottom:1px solid var(--border);font-size:11px;line-height:1.6;font-family:'JetBrains Mono',monospace;animation:fadeIn .25s}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1}}
.ev .t{color:#3f3f46;margin-right:6px}
.ev.pod{color:#60a5fa}
.ev.shuffle{color:#fb923c;font-weight:600}
.ev.stage{color:#4ade80}
.ev.spark{color:#a78bfa}
.ev.system{color:#3f3f46}
</style>
</head>
<body>
<div class="bar">
  <div class="bar-left">
    <span class="logo"><b>Spark</b> on K8s</span>
    <span class="sep">|</span>
    <span class="ns">spark-demo</span>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <button class="theme-btn" onclick="toggleTheme()" id="theme-btn">Light</button>
    <button class="theme-btn" onclick="toggleLog()" id="log-btn">Log ▶</button>
    <div class="chip"><div id="dot" class="dot"></div><span id="api-status">disconnected</span></div>
  </div>
</div>
<div class="body">
  <div class="canvas-area">
    <canvas id="c"></canvas>
    <div id="tooltip" class="tooltip"></div>
  </div>
  <div class="side">
    <div class="side-head"><span>Events Log</span><span class="toggle" onclick="toggleLog()" title="Hide log">&#9654;</span></div>
    <div class="side-scroll" id="log"></div>
  </div>
</div>

<script>
const C=document.getElementById('c'), X=C.getContext('2d'), dpr=devicePixelRatio||1;
let W,H,T=0;
function resize(){const r=C.parentElement.getBoundingClientRect();W=r.width;H=r.height;C.width=W*dpr;C.height=H*dpr;C.style.width=W+'px';C.style.height=H+'px';X.setTransform(dpr,0,0,dpr,0,0)}
resize(); addEventListener('resize',resize);

let S={pods:{},spark:{connected:false,executors:[],stages:[],jobs:[]},events:[]};
let particles=[], prevEx={};
// Hit areas for hover detection
let hitAreas = [];
const tooltip = document.getElementById('tooltip');

C.addEventListener('mousemove', (e)=>{
  const rect=C.getBoundingClientRect();
  const mx=e.clientX-rect.left, my=e.clientY-rect.top;
  let hit=null;
  for(const a of hitAreas){
    if(mx>=a.x-a.w/2 && mx<=a.x+a.w/2 && my>=a.y-a.h/2 && my<=a.y+a.h/2){hit=a;break}
  }
  if(hit){
    tooltip.innerHTML=hit.html;
    tooltip.className='tooltip show';
    // Position: above or below the node
    let tx=hit.x+hit.w/2+8, ty=hit.y-hit.h/2;
    if(tx+250>W) tx=hit.x-260;
    if(ty<10) ty=hit.y+hit.h/2+8;
    tooltip.style.left=tx+'px';
    tooltip.style.top=ty+'px';
    C.style.cursor='default';
  } else {
    tooltip.className='tooltip';
    C.style.cursor='default';
  }
});
C.addEventListener('mouseleave',()=>{tooltip.className='tooltip'});

// ---- Theme ----
let isDark = true;
function getColors(){
  if(isDark) return {
    bg:'#09090b',card:'#18181b',cardBorder:'#27272a',text:'#fafafa',textDim:'#71717a',textMuted:'#3f3f46',
    gridLine:'rgba(255,255,255,.04)',
    orange:'#f97316',blue:'#3b82f6',green:'#22c55e',purple:'#a78bfa',yellow:'#eab308'
  };
  return {
    bg:'#ffffff',card:'#f4f4f5',cardBorder:'#d4d4d8',text:'#18181b',textDim:'#52525b',textMuted:'#a1a1aa',
    gridLine:'rgba(0,0,0,.07)',
    orange:'#ea580c',blue:'#2563eb',green:'#16a34a',purple:'#7c3aed',yellow:'#ca8a04'
  };
}
let COL = getColors();

function toggleTheme(){
  isDark = !isDark;
  COL = getColors();
  document.documentElement.className = isDark ? '' : 'light';
  document.getElementById('theme-btn').textContent = isDark ? 'Light' : 'Dark';
}

// ---- Primitives ----
function rr(x,y,w,h,r,fill,stroke,lw=1){
  X.beginPath();X.roundRect(x-w/2,y-h/2,w,h,r);
  if(fill){X.fillStyle=fill;X.fill()}
  if(stroke){X.strokeStyle=stroke;X.lineWidth=lw;X.stroke()}
}
function tx(s,x,y,sz,col,al='center',wt='500'){
  X.font=`${wt} ${sz}px Inter,-apple-system,sans-serif`;X.fillStyle=col;X.textAlign=al;X.textBaseline='middle';X.fillText(s,x,y)
}
function mono(s,x,y,sz,col,al='center'){
  X.font=`500 ${sz}px 'JetBrains Mono',monospace`;X.fillStyle=col;X.textAlign=al;X.textBaseline='middle';X.fillText(s,x,y)
}
function line(x1,y1,x2,y2,col,lw=1,a=.3){
  X.save();X.globalAlpha=a;X.beginPath();X.moveTo(x1,y1);X.lineTo(x2,y2);X.strokeStyle=col;X.lineWidth=lw;X.stroke();X.restore()
}
function curve(x1,y1,x2,y2,b,col,lw=2,a=.4){
  const mx=(x1+x2)/2+b,my=(y1+y2)/2;
  X.save();X.globalAlpha=a;X.beginPath();X.moveTo(x1,y1);X.quadraticCurveTo(mx,my,x2,y2);X.strokeStyle=col;X.lineWidth=lw;X.stroke();X.restore()
}
function fmt(b){if(!b)return'0 B';const k=1024,u=['B','KB','MB','GB'];const i=Math.floor(Math.log(b)/Math.log(k));return(b/Math.pow(k,i)).toFixed(1)+' '+u[i]}

// ---- Node ----
function node(x,y,w,h,opts={}){
  const {label,sub,accent,status,glow,pulse,metrics,opacity}=opts;
  X.save();
  if(opacity!==undefined) X.globalAlpha=opacity;
  if(pulse){X.globalAlpha=.5+Math.sin(T*5)*.5}

  // Glow
  if(glow){X.shadowColor=glow;X.shadowBlur=20;rr(x,y,w,h,10,'transparent');X.shadowBlur=0}

  // Card
  rr(x,y,w,h,10,COL.card,accent||COL.cardBorder,1);

  // Accent bar on left
  if(accent){
    X.save();X.beginPath();X.roundRect(x-w/2,y-h/2,3,h,[10,0,0,10]);X.fillStyle=accent;X.fill();X.restore()
  }

  // Label
  tx(label||'', x+4, y-(sub?8:0), 12, COL.text, 'center', '600');
  if(sub) mono(sub, x+4, y+8, 10, COL.textDim);

  // Status dot
  if(status==='Running'){
    X.beginPath();X.arc(x+w/2-12, y-h/2+12, 3.5, 0, Math.PI*2);
    X.fillStyle=COL.green;X.fill();
    X.shadowColor=COL.green;X.shadowBlur=6;X.fill();X.shadowBlur=0;
  } else if(status==='Pending'||status==='ContainerCreating'){
    X.beginPath();X.arc(x+w/2-12, y-h/2+12, 3.5, 0, Math.PI*2);
    X.fillStyle=COL.yellow;X.fill();
  }

  // Metrics bar
  if(metrics && metrics.total > 0){
    const bw=w-24, bh=3, bx=x-bw/2, by=y+h/2-14;
    rr(x, by, bw, bh, 2, '#27272a');
    const pct = metrics.done / metrics.total;
    if(pct>0){
      X.beginPath();X.roundRect(bx, by-bh/2, bw*pct, bh, 2);X.fillStyle=accent||COL.blue;X.fill()
    }
    mono(`${metrics.done}/${metrics.total}`, x, by+10, 9, COL.textMuted);
  }

  X.restore();
}

// ---- Particles ----
function addP(x1,y1,x2,y2,col,spd=.015){particles.push({x1,y1,x2,y2,col,t:Math.random()*.2,spd:spd+Math.random()*.008,sz:3})}
function addCP(x1,y1,x2,y2,b,col,spd=.012){particles.push({x1,y1,x2,y2,b,col,t:Math.random()*.2,spd:spd+Math.random()*.008,sz:3,c:true})}

function tickParticles(){
  for(let i=particles.length-1;i>=0;i--){particles[i].t+=particles[i].spd;if(particles[i].t>1)particles.splice(i,1)}
}
function drawParticles(){
  particles.forEach(p=>{
    let px,py;
    if(p.c){const mx=(p.x1+p.x2)/2+p.b,my=(p.y1+p.y2)/2,mt=1-p.t;px=mt*mt*p.x1+2*mt*p.t*mx+p.t*p.t*p.x2;py=mt*mt*p.y1+2*mt*p.t*my+p.t*p.t*p.y2}
    else{px=p.x1+(p.x2-p.x1)*p.t;py=p.y1+(p.y2-p.y1)*p.t}
    X.save();X.globalAlpha=.8-p.t*.5;
    X.beginPath();X.arc(px,py,p.sz,0,Math.PI*2);X.fillStyle=p.col;X.fill();
    X.shadowColor=p.col;X.shadowBlur=10;X.beginPath();X.arc(px,py,p.sz*.5,0,Math.PI*2);X.fill();
    X.restore()
  })
}

// ---- Flow ----
function flow(layout){
  if(!layout.minio||!layout.exPos.length)return;
  const sparkEx=S.spark.executors.filter(e=>e.id!=='driver');
  const mx=layout.minio.x, my=layout.minio.y;
  sparkEx.forEach((ex,i)=>{
    if(i>=layout.exPos.length)return;
    const ep=layout.exPos[i], prev=prevEx[ex.id]||{};
    // Read: MinIO → Executor (horizontal)
    if(ex.totalInputBytes>(prev.totalInputBytes||0))
      for(let j=0;j<3;j++) addP(mx+70, my+(Math.random()-.5)*10, ep.x-75, ep.y+(Math.random()-.5)*10, COL.green);
    // Write: Executor → MinIO (horizontal)
    if(ex.totalOutputBytes>(prev.totalOutputBytes||0))
      for(let j=0;j<3;j++) addP(ep.x-75, ep.y+(Math.random()-.5)*10, mx+70, my+(Math.random()-.5)*10, COL.orange);
    // Shuffle: Executor ↔ Executor (curved below)
    if(ex.totalShuffleWrite>(prev.totalShuffleWrite||0))
      layout.exPos.forEach((op,k)=>{if(k!==i) for(let j=0;j<2;j++) addCP(ep.x,ep.y+30,op.x,op.y+30,25,COL.orange)});
    prevEx[ex.id]={...ex};
  })
}

// ---- Main ----
function draw(){
  // Background
  X.fillStyle = COL.bg;
  X.fillRect(0,0,W,H);

  // Grid
  X.strokeStyle=COL.gridLine;
  X.lineWidth=.5;
  const gs=30;
  X.beginPath();
  for(let gx=0;gx<W;gx+=gs){X.moveTo(gx,0);X.lineTo(gx,H)}
  for(let gy=0;gy<H;gy+=gs){X.moveTo(0,gy);X.lineTo(W,gy)}
  X.stroke();

  const pods=Object.values(S.pods);
  const exPods=pods.filter(p=>p.role==='executor'&&(p.status!=='Succeeded'||p.status==='removing'));
  const jupyter=pods.find(p=>p.role==='jupyter'||p.role==='driver');
  const minio=pods.find(p=>p.role==='minio'&&p.status==='Running');
  const conn=S.spark.connected;

  // ===== Centered Top-Down Layout =====
  const cx=W/2, nw=140, nh=46;
  // 4 rows, evenly distributed vertically
  const usableH = H - 60;  // minus header
  const rowGap = usableH / 4;
  const r0 = 50 + rowGap * 0.4;   // Control Plane
  const r1 = 50 + rowGap * 1.2;   // Driver
  const r2 = 50 + rowGap * 2.3;   // MinIO + Executors
  const r3 = 50 + rowGap * 3.2;   // Shuffle zone (virtual)

  hitAreas = [];

  // ── Row 0: Control Plane ──
  node(cx-85, r0, nw, nh, {label:'K8s API Server', sub:'control-plane', accent:COL.textMuted});
  node(cx+85, r0, nw, nh, {label:'Spark Operator', sub:'watching CRDs', accent:COL.purple, status:'Running'});
  line(cx-85+nw/2+4, r0, cx+85-nw/2-4, r0, COL.textMuted, 1, .15);
  tx('CONTROL PLANE', cx, r0-nh/2-12, 9, COL.textMuted, 'center', '600');
  hitAreas.push({x:cx-85,y:r0,w:nw,h:nh,html:`
    <div class="tt-title">K8s API Server</div>
    <div class="tt-row"><span class="tt-label">Role</span><span class="tt-val">Cluster control plane</span></div>
    <div class="tt-row"><span class="tt-label">Function</span><span class="tt-val">Pod scheduling, RBAC</span></div>
    <div class="tt-row"><span class="tt-label">Namespace</span><span class="tt-val">kube-system</span></div>
  `});
  hitAreas.push({x:cx+85,y:r0,w:nw,h:nh,html:`
    <div class="tt-title">Spark Operator</div>
    <div class="tt-row"><span class="tt-label">Role</span><span class="tt-val">Manage SparkApplication CRDs</span></div>
    <div class="tt-row"><span class="tt-label">Status</span><span class="tt-val tt-accent" style="color:${COL.green}">Running</span></div>
    <div class="tt-row"><span class="tt-label">Namespace</span><span class="tt-val">spark-operator</span></div>
  `});

  // ── Row 1: Driver ──
  if(jupyter){
    node(cx, r1, nw+16, nh+4, {
      label:'Driver (Jupyter)', sub:conn?'spark active':'idle',
      accent:COL.orange, status:jupyter.status,
      glow:conn?COL.orange+'30':null
    });
    line(cx, r1-nh/2-2, cx-85, r0+nh/2+2, COL.orange, 1.5, .3);
    line(cx, r1-nh/2-2, cx+85, r0+nh/2+2, COL.purple, 1.5, .25);
    const drInfo=S.spark.executors.find(e=>e.id==='driver');
    hitAreas.push({x:cx,y:r1,w:nw+16,h:nh+4,html:`
      <div class="tt-title">Driver (Jupyter)</div>
      <div class="tt-row"><span class="tt-label">Mode</span><span class="tt-val">Client (Notebook = Driver)</span></div>
      <div class="tt-row"><span class="tt-label">Status</span><span class="tt-val">${jupyter.status}</span></div>
      <div class="tt-row"><span class="tt-label">Spark API</span><span class="tt-val tt-accent" style="color:${conn?COL.green:COL.yellow}">${conn?'Connected':'Disconnected'}</span></div>
      <div class="tt-row"><span class="tt-label">App ID</span><span class="tt-val">${S.spark.app_id||'—'}</span></div>
      <div class="tt-row"><span class="tt-label">Jobs</span><span class="tt-val">${S.spark.jobs.length}</span></div>
      <div class="tt-row"><span class="tt-label">Stages</span><span class="tt-val">${S.spark.stages.length}</span></div>
    `});
  }
  tx('DRIVER', cx, r1-nh/2-12, 9, COL.textMuted, 'center', '600');

  // ── Row 2: Storage + Compute ──

  // ── 計算整體寬度，然後置中 ──
  // 最少顯示 3 個 slot 的寬度（MinIO + 2 個 Executor 預留位）確保置中好看
  const visibleItems = (minio?1:0) + exPods.length;
  const minSlots = Math.max(visibleItems, 3);
  const slotW = 160, slotGap = 25;
  const totalW = minSlots * slotW + Math.max(0,minSlots-1) * slotGap;
  const startX = cx - totalW/2 + slotW/2;

  let slot = 0;
  const mnCenterY = r2;
  let mnX = startX; // default

  if(minio){
    mnX = startX + slot*(slotW+slotGap);
    node(mnX, mnCenterY, nw, nh+8, {label:'MinIO', sub:'s3://spark-data', accent:COL.green, status:'Running'});
    tx('STORAGE', mnX, mnCenterY-nh/2-16, 9, COL.textMuted, 'center', '600');
    if(jupyter) line(cx-20, r1+nh/2+4, mnX, mnCenterY-nh/2-6, COL.green, 1.5, .2);
    slot++;
    hitAreas.push({x:mnX,y:mnCenterY,w:nw,h:nh+8,html:`
      <div class="tt-title">MinIO</div>
      <div class="tt-row"><span class="tt-label">Role</span><span class="tt-val">S3-compatible storage</span></div>
      <div class="tt-row"><span class="tt-label">Endpoint</span><span class="tt-val">minio-svc:9000</span></div>
      <div class="tt-row"><span class="tt-label">Buckets</span><span class="tt-val">spark-data, spark-logs</span></div>
      <div class="tt-row"><span class="tt-label">Paths</span><span class="tt-val">raw/ processed/</span></div>
    `});
  }

  // Executors
  const exW=slotW-5, exH=58;
  const exPos=[];

  const exLabelX = startX + (minio?1:0)*(slotW+slotGap) + (exPods.length>0?(exPods.length-1)*(slotW+slotGap)/2:0);
  tx(`COMPUTE (${exPods.length} executors)`, exLabelX, r2-42, 9, COL.textMuted, 'center', '600');

  exPods.forEach((ep,i)=>{
    const ex_x = startX + slot*(slotW+slotGap);
    const ex_y = r2;
    slot++;
    const num=i+1;  // 直接用順序編號
    const run=ep.status==='Running';
    const pending=ep.status==='Pending'||ep.status==='ContainerCreating';
    const removing=ep.status==='removing';
    const exInfo=S.spark.executors.find(e=>e.id===String(num));
    exPos.push({x:ex_x, y:ex_y});

    node(ex_x, ex_y, exW, exH, {
      label:`Executor ${num}`,
      sub:removing?'shutting down...':(exInfo?`${exInfo.activeTasks} active`:(pending?'starting...':'idle')),
      accent:removing?COL.textMuted:COL.blue,
      status:removing?'removing':ep.status,
      pulse:pending,
      glow:run&&exInfo&&exInfo.activeTasks>0?COL.blue+'25':null,
      metrics:exInfo?{done:exInfo.completedTasks,total:exInfo.totalTasks}:null,
      opacity:removing?0.3:1
    });

    // Driver → Executor
    if(jupyter) line(cx, r1+nh/2+4, ex_x, ex_y-exH/2-2, COL.blue, 1.5, .25);
    // MinIO → Executor
    if(minio) line(mnX+nw/2+4, mnCenterY, ex_x-exW/2-4, ex_y, COL.green, 1.5, .2);

    // Tooltip
    hitAreas.push({x:ex_x,y:ex_y,w:exW,h:exH,html:`
      <div class="tt-title">Executor ${num}</div>
      <div class="tt-row"><span class="tt-label">Status</span><span class="tt-val tt-accent" style="color:${run?COL.green:COL.yellow}">${ep.status}</span></div>
      <div class="tt-row"><span class="tt-label">Pod</span><span class="tt-val">${ep.name.slice(0,30)}...</span></div>
      ${exInfo?`
      <div class="tt-row"><span class="tt-label">Tasks</span><span class="tt-val">${exInfo.completedTasks} / ${exInfo.totalTasks}</span></div>
      <div class="tt-row"><span class="tt-label">Active</span><span class="tt-val">${exInfo.activeTasks}</span></div>
      <div class="tt-row"><span class="tt-label">Memory</span><span class="tt-val">${fmt(exInfo.memoryUsed)} / ${fmt(exInfo.maxMemory)}</span></div>
      <div class="tt-row"><span class="tt-label">Input</span><span class="tt-val" style="color:${COL.green}">${fmt(exInfo.totalInputBytes)}</span></div>
      <div class="tt-row"><span class="tt-label">Output</span><span class="tt-val" style="color:${COL.orange}">${fmt(exInfo.totalOutputBytes)}</span></div>
      <div class="tt-row"><span class="tt-label">Shuffle Read</span><span class="tt-val tt-accent" style="color:${COL.orange}">${fmt(exInfo.totalShuffleRead)}</span></div>
      <div class="tt-row"><span class="tt-label">Shuffle Write</span><span class="tt-val tt-accent" style="color:${COL.orange}">${fmt(exInfo.totalShuffleWrite)}</span></div>
      `:'<div class="tt-row"><span class="tt-label">Metrics</span><span class="tt-val">waiting...</span></div>'}
    `});

  });

  // ── Shuffle ──
  const hasShuffle=S.spark.executors.some(e=>e.totalShuffleWrite>0);
  const activeShuffle=S.spark.stages.some(s=>s.status==='ACTIVE'&&s.shuffleWriteBytes>0);
  if(hasShuffle&&exPos.length>=2){
    for(let i=0;i<exPos.length;i++) for(let j=i+1;j<exPos.length;j++){
      const bend=25+(j-i)*8;
      curve(exPos[i].x, exPos[i].y+exH/2, exPos[j].x, exPos[j].y+exH/2, bend, COL.orange, 1.5, activeShuffle?.4:.15);
      curve(exPos[j].x, exPos[j].y+exH/2, exPos[i].x, exPos[i].y+exH/2, -bend, COL.orange, 1.5, activeShuffle?.4:.15);
    }
    const ts=S.spark.executors.reduce((s,e)=>s+(e.totalShuffleWrite||0),0);
    if(ts>0){
      const mx=(exPos[0].x+exPos[exPos.length-1].x)/2;
      rr(mx, r2+exH/2+22, 110, 20, 6, 'rgba(249,115,22,.08)', COL.orange, 1);
      mono(`Shuffle ${fmt(ts)}`, mx, r2+exH/2+22, 9, COL.orange);
    }
  }

  // Shuffle badges per executor
  exPos.forEach((ep,i)=>{
    const exInfo=S.spark.executors.find(e=>e.id!=='driver'&&S.spark.executors.filter(x=>x.id!=='driver').indexOf(e)===i);
    if(exInfo&&(exInfo.totalShuffleRead>0||exInfo.totalShuffleWrite>0)){
      mono(`R:${fmt(exInfo.totalShuffleRead)} W:${fmt(exInfo.totalShuffleWrite)}`, ep.x, ep.y+exH/2+12, 8, COL.orange);
    }
  });

  // Empty hint
  if(exPods.length===0){
    tx('Executors will appear here', cx + (minio?80:0), r2, 11, COL.textMuted);
  }

  // Particles
  flow({minio:minio?{x:mnX,y:mnCenterY}:null, exPos});
  tickParticles();
  drawParticles();

  T+=.016;
}

function loop(){try{draw()}catch(e){console.error(e)}requestAnimationFrame(loop)}
loop();

// ---- Events ----
const sse=new EventSource('/api/events');
sse.onmessage=e=>{const ev=JSON.parse(e.data);const d=document.createElement('div');d.className='ev '+ev.type;d.innerHTML=`<span class="t">${ev.time}</span>${ev.message}`;const l=document.getElementById('log');l.insertBefore(d,l.firstChild);while(l.children.length>60)l.removeChild(l.lastChild)};

function toggleLog(){
  var s = document.querySelector('.side');
  var b = document.getElementById('log-btn');
  s.classList.toggle('closed');
  b.textContent = s.classList.contains('closed') ? 'Log ◀' : 'Log ▶';
}

async function poll(){try{const r=await fetch('/api/state');S=await r.json();document.getElementById('dot').className='dot '+(S.spark.connected?'on':'');document.getElementById('api-status').textContent=S.spark.connected?'connected':'disconnected'}catch(e){}}
setInterval(poll,1000);poll();
</script>
