# ============================================================
# ETL Pipeline - SparkApplication
#
# Similar YAML structure to SparkPi, but this time:
#   - Uses custom image (with S3 connector + ETL code)
#   - Type changed to Python (PySpark)
#   - Includes MinIO connection configuration
# ============================================================
apiVersion: sparkoperator.k8s.io/v1beta2
kind: SparkApplication
metadata:
  name: etl-pipeline
  namespace: spark-demo
spec:
  type: Python
  pythonVersion: "3"
  mode: cluster
  image: spark-etl:latest           # Our custom image
  imagePullPolicy: Never             # Pull from local Minikube registry (not Docker Hub)
  mainApplicationFile: local:///opt/spark/work-dir/etl_pipeline.py
  sparkVersion: "3.5.3"

  restartPolicy:
    type: Never

  # MinIO / S3 connection configuration
  sparkConf:
    "spark.hadoop.fs.s3a.endpoint": "http://minio-svc.spark-demo.svc.cluster.local:9000"
    "spark.hadoop.fs.s3a.access.key": "minioadmin"
    "spark.hadoop.fs.s3a.secret.key": "minioadmin"
    "spark.hadoop.fs.s3a.path.style.access": "true"
    "spark.hadoop.fs.s3a.impl": "org.apache.hadoop.fs.s3a.S3AFileSystem"
    "spark.hadoop.fs.s3a.connection.ssl.enabled": "false"
    # Event log - written to MinIO so History Server can read it
    "spark.eventLog.enabled": "true"
    "spark.eventLog.dir": "s3a://spark-logs/history"

  driver:
    cores: 1
    memory: "512m"
    serviceAccount: spark
    labels:
      app: etl-pipeline
      role: driver

  executor:
    cores: 1
    instances: 2
    memory: "512m"
    labels:
      app: etl-pipeline
      role: executor
